<!DOCTYPE html>
<html lang="en">
<head>

    .btn { display: inline-block; margin-top: 24px; padding: 12px 28px; background: #1A6DB5; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; }
